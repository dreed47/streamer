services:
  cam-recorder:
    build: .
    container_name: ${CONTAINER_NAME:-STREAMER1}
    env_file:
      - .env
    restart: unless-stopped
    shm_size: '256m'
    mem_limit: 1536m
    memswap_limit: 1536m
    volumes:
      - ./recordings:/recordings
    environment:
      - TZ=${TZ:-Europe/London}   # change as needed
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
